{% extends "base.html" %}
{% block title %}Login — E-Library{% endblock %}
{% block content %}
<main class="mx-auto flex min-h-[70vh] max-w-md flex-col justify-center px-4 py-16 sm:px-6">
    <div class="rounded-3xl border border-white/10 bg-white/[0.07] p-8 shadow-glass backdrop-blur-2xl">
        <h1 class="text-center text-2xl font-bold text-white">Welcome back</h1>
        <p class="mt-2 text-center text-sm text-slate-400">Sign in to request books and view your loans.</p>
        {% if form.errors %}
        <p class="mt-4 rounded-xl border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-center text-sm text-rose-100">Invalid username or password.</p>
        {% endif %}
        <form method="post" action="{% url 'login' %}" class="mt-8 space-y-4">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div>
                <label for="id_username" class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-slate-400">Username</label>
                <input name="username" id="id_username" autofocus required autocomplete="username"
                    class="w-full rounded-xl border border-white/10 bg-slate-950/50 px-4 py-3 text-sm text-white outline-none ring-2 ring-transparent focus:border-sky-400/40 focus:ring-sky-500/30">
            </div>
            <div>
                <label for="id_password" class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
                <input type="password" name="password" id="id_password" required autocomplete="current-password"
                    class="w-full rounded-xl border border-white/10 bg-slate-950/50 px-4 py-3 text-sm text-white outline-none ring-2 ring-transparent focus:border-sky-400/40 focus:ring-sky-500/30">
            </div>
            <button type="submit"
                class="mt-2 w-full rounded-xl bg-gradient-to-r from-sky-500 to-blue-600 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-950/40 hover:from-sky-400 hover:to-blue-500">
                Sign in
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-400">
            No account?
            <a href="{% url 'register' %}" class="font-semibold text-sky-400 hover:text-sky-300">Create one</a>
        </p>
        <p class="mt-3 text-center text-xs text-slate-500">
            <a href="{% url 'home' %}" class="text-sky-400 hover:text-sky-300">← Back to catalog</a>
        </p>
    </div>
</main>
{% endblock %}
